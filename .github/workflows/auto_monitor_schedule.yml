name: Auto Monitor Schedule

on:
  schedule:
    - cron: "0 1,7,13 * * *" # UTC 时间对应北京时间 9:00, 15:00, 21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: windows-latest
    env:
      NJU_USERNAME: ${{ secrets.NJU_USERNAME }}
      NJU_PASSWORD: ${{ secrets.NJU_PASSWORD }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Cache pip and wheels
      uses: actions/cache@v4
      with:
        path: |
          ./.wheels
          ~/.cache/pip
        key: ${{ runner.os }}-pip-wheels-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-wheels-

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies (use cached wheels when available)
      run: |
        python -m pip install --upgrade pip
        python -m pip wheel --wheel-dir=.wheels -r requirements.txt || echo "wheel build failed, will fall back to direct install"
        python -m pip install --no-index --find-links=.wheels -r requirements.txt || python -m pip install -r requirements.txt

    - name: Run Auto Monitor
      shell: cmd
      run: .\run_auto_monitor_workflow.bat

    - name: Commit and push changes
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # 只添加常见的产出目录，避免把临时构建文件（.wheels, __pycache__ 等）加入版本库
        git add data/ logs/ || echo "没有 data/ 或 logs/ 变更"
        git commit -m "Auto update: monitor data (run $($env:GITHUB_RUN_ID))" -q || echo "No changes to commit"
        git push origin HEAD:master || echo "Push failed"