name: Auto Monitor Schedule

on:
  schedule:
    - cron: "0 1,7,13 * * *" # UTC 时间对应北京时间 9:00, 15:00, 21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    env:
      NJU_USERNAME: ${{ secrets.NJU_USERNAME }}
      NJU_PASSWORD: ${{ secrets.NJU_PASSWORD }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Cache pip and wheels
      uses: actions/cache@v4
      with:
        path: |
          ./.wheels
          ~/.cache/pip
        key: ${{ runner.os }}-pip-wheels-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-wheels-

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install system deps (Chromium + ChromeDriver)
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver || true

    - name: Install dependencies (use cached wheels when available)
      run: |
        python -m pip install --upgrade pip
        python -m pip wheel --wheel-dir=.wheels -r requirements.txt || echo "wheel build failed, will fall back to direct install"
        python -m pip install --no-index --find-links=.wheels -r requirements.txt || python -m pip install -r requirements.txt

    - name: Run Auto Monitor (Linux)
      shell: bash
      run: |
        echo "Running Python wrapper"
        python3 src/run_workflow_wrapper.py

    - name: Commit and push changes
      if: always()
      shell: bash
      env:
        GIT_UPDATE_TOKEN: ${{ secrets.GIT_UPDATE_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        branch=${GITHUB_REF##*/}
        echo "Current branch: $branch"
        git add data/ logs/ || echo "no data/ or logs/ changes"
        git commit -m "Auto update: monitor data (run ${GITHUB_RUN_ID})" -q || echo "No changes to commit"
        git remote set-url origin https://x-access-token:${GIT_UPDATE_TOKEN}@github.com/${{ github.repository }}.git
        git push origin "HEAD:$branch" || echo "Push failed"

    - name: Show latest wrapper log
      if: always()
      shell: bash
      run: |
        echo "Logs dir content:";
        ls -lt logs || true
        latest=$(ls -t logs 2>/dev/null | head -n1 || true)
        if [ -n "$latest" ]; then
          echo "---- BEGIN latest log: $latest ----";
          sed -n '1,200p' "logs/$latest" || true
          echo "---- END latest log ----";
        else
          echo "No log files found in ./logs"
        fi

    - name: Upload logs as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nju_electric_monitor-logs-${{ github.run_id }}
        path: |
          logs/**
