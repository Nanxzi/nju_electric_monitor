name: Auto Monitor Schedule

on:
  schedule:
    - cron: "0 1,7,13 * * *" # UTC 时间对应北京时间 9:00, 15:00, 21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    env:
      NJU_USERNAME: ${{ secrets.NJU_USERNAME }}
      NJU_PASSWORD: ${{ secrets.NJU_PASSWORD }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install system deps (Chromium + ChromeDriver + fonts + tesseract)
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver || true
        # 安装常用中文字体，避免 matplotlib 警告并支持中文显示
        sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji fonts-wqy-zenhei fonts-wqy-microhei fonts-dejavu-core || true
        sudo apt-get install -y tesseract-ocr || true
        sudo fc-cache -fv

    - name: Install dependencies (use pip cache when available)
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements_workflow.txt

    - name: Run Auto Monitor (Linux)
      shell: bash
      run: |
        echo "Running Python wrapper"
        python3 src/run_workflow_wrapper.py

    - name: Commit and push changes
      if: always()
      shell: bash
      env:
        GIT_UPDATE_TOKEN: ${{ secrets.GIT_UPDATE_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        branch=${GITHUB_REF##*/}
        echo "Current branch: $branch"

        # 提交 data/ 目录的变更（如果有）
        git add -A data/ || echo "no data/ changes"
        git commit -m "Auto update: data (run ${GITHUB_RUN_ID})" -q || echo "No data changes to commit"

        # 提交 logs/ 目录的变更（如果有）
        git add -A logs/ || echo "no logs/ changes"
        git commit -m "Auto update: logs (run ${GITHUB_RUN_ID})" -q || echo "No logs changes to commit"

        # 使用 token 推送到当前分支
        git remote set-url origin https://x-access-token:${GIT_UPDATE_TOKEN}@github.com/${{ github.repository }}.git
        git push origin "HEAD:$branch" || echo "Push failed"

    - name: Show latest wrapper log
      if: always()
      shell: bash
      run: |
        echo "Logs dir content:";
        ls -lt logs || true
        latest=$(ls -t logs 2>/dev/null | head -n1 || true)
        if [ -n "$latest" ]; then
          echo "---- BEGIN latest log: $latest ----";
          # 输出整个日志文件而不限行数
          cat "logs/$latest" || true
          echo "---- END latest log ----";
        else
          echo "No log files found in ./logs"
        fi

    - name: Upload logs as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nju_electric_monitor-logs-${{ github.run_id }}
        path: |
          logs/**
